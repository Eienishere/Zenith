<!DOCTYPE html>
<html lang="tr" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <title>Zenith</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="wrap">

    <!-- ── HEADER ── -->
    <div class="header">
      <div class="hdr-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
        </svg>
      </div>
      <div class="hdr-text">
        <h1>Zenith</h1>
      </div>
      <div class="hdr-actions">

        <!-- Settings dropdown trigger -->
        <div class="settings-wrap" id="settingsWrap">
          <button class="icon-btn" id="settingsBtn" title="Ayarlar" data-i18n-title="settings">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.43.992a6.759 6.759 0 010 .255c-.008.378.137.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="tip" data-i18n="settings">Ayarlar</span>
          </button>

          <!-- Settings panel -->
          <div class="settings-panel" id="settingsPanel">
            <div class="settings-title" data-i18n="settings">Ayarlar</div>

            <!-- Theme -->
            <div class="settings-item" id="themeRow">
              <div class="settings-item-label" data-i18n="darkTheme">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
                </svg>
                Karanlık Tema
              </div>
              <div class="toggle on" id="themeToggle"></div>
            </div>

            <div class="settings-sep"></div>

            <!-- Language -->
            <div class="settings-item">
              <div class="settings-item-label" data-i18n="language">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M10.5 21l5.25-11.25L21 21m-9-3h7.5M3 5.621a48.474 48.474 0 016-.671M12 3.375v1.5m-1.5 0a48.474 48.474 0 00-4.5.369m0 0A3.375 3.375 0 012.25 5.25m3.75-1.5l.397-1.492a1.125 1.125 0 011.066-.791h1.074a1.125 1.125 0 011.066.791l.397 1.492" />
                </svg>
                Dil
              </div>
              <div class="lang-selector" id="langSelector">
                <div class="lang-selected" id="langSelectBtn">
                  <img src="tr.svg" id="currentFlag" alt="">
                  <span id="currentLangText">TR</span>
                </div>
                <div class="lang-dropdown" id="langDropdown">
                  <div class="lang-option" data-value="tr">
                    <img src="tr.svg" alt=""> <span>TR</span>
                  </div>
                  <div class="lang-option" data-value="en">
                    <img src="en.svg" alt=""> <span>EN</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="settings-sep"></div>

            <!-- Clear on paste -->
            <div class="settings-item" id="clearOnPasteRow">
              <div class="settings-item-label" data-i18n="clearOnPaste">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184" />
                </svg>
                Yapıştırınca Otomatik Sil
              </div>
              <div class="toggle" id="clearOnPasteToggle"></div>
            </div>

            <div class="settings-sep"></div>

            <!-- Manual clear -->
            <div class="settings-item" id="manualClearRow" style="cursor:pointer">
              <div class="settings-item-label" data-i18n="clearNow">
                <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                </svg>
                Panoyu Şimdi Temizle
              </div>
              <span id="clearNowStatus" style="font-size:10.5px;color:var(--success);opacity:0;transition:opacity .3s"
                data-i18n="cleared">✓
                Temizlendi</span>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- ── PASSWORD CARD ── -->
    <div class="pw-card">
      <div class="pw-label" data-i18n="generatedPw">Oluşturulan Şifre</div>
      <div class="pw-field-wrap">
        <div class="pw-out" id="pwOut" data-i18n="loading">Yükleniyor...</div>
        <div class="pw-actions">
          <!-- Eye toggle -->
          <button class="icon-btn eye-btn" id="eyeBtn" title="Göster / Gizle" data-i18n-title="eyeToggle">
            <svg id="icoEye" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.641 0-8.573-3.007-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <svg id="icoEyeOff" style="display:none" fill="none" viewBox="0 0 24 24" stroke-width="2"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
            </svg>
            <span class="tip" data-i18n="eyeToggle">Göster/Gizle</span>
          </button>
          <!-- Copy -->
          <button class="icon-btn copy-btn" id="copyBtn" title="Kopyala" data-i18n-title="copy">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.666 3.888A2.25 2.25 0 0013.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 01-.75.75H9a.75.75 0 01-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 01-2.25 2.25H6.75A2.25 2.25 0 014.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 011.927-.184" />
            </svg>
            <svg class="ico-check" style="position:absolute;opacity:0" fill="none" viewBox="0 0 24 24"
              stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
            <span class="tip" data-i18n="copy">Kopyala</span>
          </button>
          <!-- Refresh -->
          <button class="icon-btn refresh-btn" id="refreshBtn" title="Yenile" data-i18n-title="refresh">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
            </svg>
            <span class="tip" data-i18n="refresh">Yenile</span>
          </button>
        </div>
      </div>

      <!-- Strength -->
      <div class="strength-row">
        <div class="str-bars" id="strBars">
          <div class="str-bar"></div>
          <div class="str-bar"></div>
          <div class="str-bar"></div>
          <div class="str-bar"></div>
        </div>
        <div class="str-lbl" id="strLbl">—</div>
      </div>

      <!-- Crack time -->
      <div class="crack-row">
        <span class="crack-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 9v3.75m0-10.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.75c0 5.592 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.57-.598-3.75h-.152c-3.196 0-6.1-1.249-8.25-3.286zm0 13.036h.008v.008H12v-.008z" />
          </svg>
        </span>
        <span class="crack-label" data-i18n="crackTimeLabel">Kırılma süresi tahmini:</span>
        <span class="crack-val" id="crackVal">—</span>
      </div>
    </div>

    <div class="div"></div>

    <!-- ── LENGTH SLIDER ── -->
    <div class="slider-section">
      <div class="slider-header">
        <span class="sec-label" data-i18n="length">Uzunluk</span>
        <span class="len-badge" id="lenBadge">16</span>
      </div>
      <input type="range" id="lenSlider" min="8" max="120" value="16" />
      <div class="slider-minmax"><span>8</span><span>120</span></div>
    </div>

    <div class="div"></div>

    <!-- ── OPTIONS ACCORDION ── -->
    <div class="accordion" id="accordion">
      <button class="accordion-trigger" id="accordionTrigger">
        <div class="accordion-left" data-i18n="charOptions">
          <svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75" />
          </svg>
          Karakter Seçenekleri
        </div>
        <div class="accordion-meta">
          <span class="accordion-count" id="optCount">4 seçili</span>
          <svg class="accordion-arrow" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
          </svg>
        </div>
      </button>
      <div class="accordion-body">
        <div class="opts-grid">

          <label class="opt-chip on" id="lbl-lower">
            <input type="checkbox" id="useLower" checked />
            <div class="chip-box"></div>
            <div class="chip-txt"><strong data-i18n="lower">Küçük Harf</strong><span>a–z</span></div>
          </label>

          <label class="opt-chip on" id="lbl-upper">
            <input type="checkbox" id="useUpper" checked />
            <div class="chip-box"></div>
            <div class="chip-txt"><strong data-i18n="upper">Büyük Harf</strong><span>A–Z</span></div>
          </label>

          <label class="opt-chip on" id="lbl-numbers">
            <input type="checkbox" id="useNumbers" checked />
            <div class="chip-box"></div>
            <div class="chip-txt"><strong data-i18n="numbers">Rakamlar</strong><span>0–9</span></div>
          </label>

          <label class="opt-chip on" id="lbl-symbols">
            <input type="checkbox" id="useSymbols" checked />
            <div class="chip-box"></div>
            <div class="chip-txt"><strong data-i18n="symbols">Semboller</strong><span>!@#$%^&amp;*</span></div>
          </label>

          <label class="opt-chip on" id="lbl-spaces">
            <input type="checkbox" id="useSpaces" checked />
            <div class="chip-box"></div>
            <div class="chip-txt"><strong data-i18n="spaces">Boşluk</strong><span>space</span></div>
          </label>

          <label class="opt-chip" id="lbl-pronounce">
            <input type="checkbox" id="usePronounce" />
            <div class="chip-box"></div>
            <div class="chip-txt"><strong data-i18n="pronounceable">Okunabilir</strong><span
                data-i18n="pronounceDesc">söylenebilir</span></div>
          </label>

        </div>
      </div>
    </div>

  </div>
  <script src="translations.js"></script>
  <script src="popup.js"></script>
</body>

</html>
